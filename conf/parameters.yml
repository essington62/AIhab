# parameters.yml — All tunable parameters for the btc-trading-v1 system.
# Gate Scoring v2 — validated walk-forward (208 signals, 2025+)

# ---------------------------------------------------------------------------
# Z-score rolling windows
# ---------------------------------------------------------------------------
zscore_windows:
  oi: 14
  taker: 14
  taker_1h: 168          # 7d × 24h — native Binance 1h taker (FASE 3)
  funding: 14
  dgs10: 30
  dgs2: 30
  rrp: 30
  yield_curve: 30
  stablecoin_mcap: 30
  bubble_index: 30
  etf_flows: 30
  fear_greed: 252        # 1y window: 30d captured only Extreme Fear period → z inverted

etf_flow_rolling: 7          # days for ETF cumulative flow pre-z-score

# ---------------------------------------------------------------------------
# Technical indicators (G1)
# ---------------------------------------------------------------------------
technical:
  bb_window: 20
  bb_std: 2
  rsi_window: 14
  ma_windows: [7, 21, 50, 99, 200]

# G1 bucket scoring — DO NOT MODIFY (walk-forward validated)
g1_bb_scores:
  - {threshold: 0.80, condition: "gte", score: -2.0}   # kill switch top
  - {threshold: 0.20, condition: "lt",  score: 3.0}    # win 88%
  - {threshold: 0.30, condition: "lt",  score: 2.0}    # win 77%
  - {threshold: 0.40, condition: "lt",  score: 0.5}
  - {threshold: null, condition: "else", score: 0.0}

g1_rsi_scores:
  - {threshold: 35, condition: "lt",  score: 1.0}
  - {threshold: 45, condition: "lt",  score: 0.5}
  - {threshold: 60, condition: "gt",  score: -1.0}
  - {threshold: null, condition: "else", score: 0.0}

# ---------------------------------------------------------------------------
# Gate parameters (corr, sensitivity, max_score) for G3–G10
# ---------------------------------------------------------------------------
gate_params:
  g3_dgs10:    [-0.315, 0.7, 1.0]
  g3_curve:    [-0.282, 0.7, 0.8]
  g3_rrp:      [0.212,  0.7, 0.7]
  g3_dgs2:     [-0.154, 0.7, 0.5]
  g4_oi:       [-0.472, 0.8, 2.0]
  g5_stable:   [0.326,  0.6, 1.5]   # raised 1.0→1.5 (corr 7d=+0.50, best predictor)
  g6_bubble:   [-0.345, 0.7, 0.0]   # paper trading: zero contribution (monitoring only)
  g7_etf:      [0.263,  0.6, 1.5]   # raised 1.0→1.5 (corr 7d=+0.48, 2nd best)
  g8_fg:       [-0.211, 0.7, 0.8]
  g9_taker:    [0.143,  0.5, 0.3]   # lowered 0.5→0.3 (corr 7d=+0.06, noise)
  g10_funding: [-0.064, 0.4, 0.5]

# ---------------------------------------------------------------------------
# Cluster caps (anti-double-counting)
# ---------------------------------------------------------------------------
cluster_caps:
  technical:   [-2.0, 3.5]
  news:        [-1.5, 1.0]
  macro:       [-1.5, 1.0]
  positioning: [-2.0, 1.5]
  liquidity:   [-1.5, 2.5]   # raised ceiling 1.5→2.5 (g5+g7 now max 3.0)
  sentiment:   [-1.5, 1.5]

# ---------------------------------------------------------------------------
# Dynamic threshold
# ---------------------------------------------------------------------------
threshold:
  warmup_value: 3.5          # used when history < min_history_days
  floor: 2.0
  ceiling: 5.0
  quantile: 0.75
  history_window: 90         # days
  min_history_days: 90

# ---------------------------------------------------------------------------
# Kill switches
# ---------------------------------------------------------------------------
kill_switches:
  bb_top_threshold: 0.80
  oi_extreme_z: 2.5
  news_bear_score: -3.0
  g2_fed_fomc_threshold: -1.0

# ---------------------------------------------------------------------------
# Regime multiplier (G0) — Sideways only; Bear=0.0 (block), Bull=1.0 (fixed)
# ---------------------------------------------------------------------------
sideways_multiplier: 1.0   # paper trading: pass raw score through; production default: 0.5

# ---------------------------------------------------------------------------
# Stale data tolerance (days)
# ---------------------------------------------------------------------------
stale_tolerance_days:
  g4_oi: 3
  g9_taker: 3
  g10_funding: 3
  g5_stablecoin: 7
  g6_bubble: 7
  g7_etf: 5
  g8_fg: 3
  g3_macro: 2

# ---------------------------------------------------------------------------
# Execution / position sizing
# ---------------------------------------------------------------------------
execution:
  position_size_pct: 1.0     # 100% of paper capital per trade
  paper_capital_usd: 10000.0

  # Dynamic stops (ATR-based) — ATR% calculated once at entry, fixed for trade duration
  use_dynamic_stops: true
  atr_multiplier_sl: 2.0       # K_sl:    Stop Loss   = K × ATR%
  atr_multiplier_tp: 1.5       # K_tp:    Take Profit = K × ATR%
  atr_multiplier_trail: 1.0    # K_trail: Trailing    = K × ATR%

  # Safety clamps for dynamic stops
  min_stop_loss_pct: 0.01      # SL never < 1%
  max_stop_loss_pct: 0.06      # SL never > 6%
  min_take_profit_pct: 0.01    # TP never < 1%
  max_take_profit_pct: 0.06    # TP never > 6%
  min_trailing_pct: 0.008      # trailing never < 0.8%
  max_trailing_pct: 0.04       # trailing never > 4%

  # Fixed stops — fallback when ATR unavailable or use_dynamic_stops=false
  stop_loss_pct: 0.03          # 3%
  take_profit_pct: 0.02        # 2%
  trailing_stop_pct: 0.015     # 1.5%

# ---------------------------------------------------------------------------
# News classification (DeepSeek)
# ---------------------------------------------------------------------------
news:
  crypto_weight: 0.5
  fed_weight: 0.5
  max_articles_per_cycle: 50
  lookback_hours: 4          # hours to look back for news scoring

# ---------------------------------------------------------------------------
# Fed Sentinel proximity adjustments (added to threshold)
# ---------------------------------------------------------------------------
fed:
  current_rate: "3.50-3.75"
  current_rate_mid: 3.625
  proximity_adjustments:
    fomc_decision_t0_t2: 1.5      # T-2 to T0 FOMC decision
    fomc_decision_t3_t5: 0.7      # T-5 to T-3 FOMC
    hearing_transition_t0_t1: 0.5 # T-1 to T0 hearing/transition
    fomc_post_t1: 0.3             # T+1 after FOMC
    blackout: 0.3                 # T-10 to T-2 blackout
    normal: 0.0
  blackout_days_before: 10        # blackout starts T-10
  blackout_ends_days_before: 2    # blackout ends T-2
  g2_fed_kill_threshold: -1.0

# ---------------------------------------------------------------------------
# MA200 override (bypass slow R5C in sustained downtrends)
# ---------------------------------------------------------------------------
ma200_override:
  enabled: true
  consecutive_days: 5   # days below MA200 with negative slope before forcing Bear

# ---------------------------------------------------------------------------
# R5C HMM
# ---------------------------------------------------------------------------
r5c:
  n_states: 3
  covariance_type: full
  features: [log_return, vol_short, vol_ratio, drawdown, volume_z, slope_21d]
  vol_short_window: 7
  vol_long_window: 30
  slope_window: 21
  # State label mapping (index → label) — ordered by drawdown ascending
  # means_[0].drawdown=-0.019 (Bull), means_[1].drawdown=-0.157 (Bear), means_[2].drawdown=-0.136 (Sideways)
  state_labels: {0: "Bull", 1: "Bear", 2: "Sideways"}
  daily_close_hour_utc: 0   # Binance daily candle closes at 00:00 UTC

# ---------------------------------------------------------------------------
# Reversal filter (entry confirmation — applied AFTER scoring)
# ---------------------------------------------------------------------------
reversal_filter:
  enabled: true
  rsi_max: 35               # RSI must be BELOW this (oversold confirmation)
  ret_1d_min: -0.01         # 1d return must be ABOVE -1% (not a falling knife)
  rsi_extreme_override: 25  # RSI below this = extreme capitulation → ignores ret_1d_min (0 = disabled)

  # Cooldown após stop loss — evita loop de reentrada
  cooldown:
    enabled: true
    hours_after_sl: 12               # mínimo 12h após stop loss para reentrar
    require_price_above_exit: true   # preço deve estar acima do preço de saída do SL
    bounce_pct: 0.003                # buffer de +0.3% acima do preço de saída (reversão real)
    max_consecutive_sl: 3            # após 3 SLs consecutivos, pausa estendida
    consecutive_sl_pause_hours: 24   # pausa de 24h após atingir max_consecutive_sl

# ---------------------------------------------------------------------------
# Momentum filter (Bot 2 — entry confirmation, independent of gate scoring)
# ---------------------------------------------------------------------------
momentum_filter:
  enabled: true
  stablecoin_z_min: 1.3     # Stablecoin z-score mínimo (liquidez entrando)
  ret_1d_min: 0.0            # Retorno 1d mínimo (momentum positivo, > 0%)
  rsi_min: 50                # RSI mínimo (zona bullish)
  bb_pct_max: 0.98           # BB% máximo (filtro anti blow-off top)
  require_above_ma21: true   # Preço deve estar acima da MA21

  # Cooldown após stop loss — mesmo mecanismo do Bot 1
  cooldown:
    enabled: true
    hours_after_sl: 12
    require_price_above_exit: true
    bounce_pct: 0.003
    max_consecutive_sl: 3
    consecutive_sl_pause_hours: 24

  # News filter: bloqueia entrada se notícias muito bearish
  # Bot 2 compra momentum — news bearish contradiz a tese
  # Mais conservador que o kill switch do Bot 1 (-3.0)
  news_score_min: -1.0

  # Anti-spike guard: bloqueia entrada tardia em rally já estendido
  # Se ret_1d > spike_ret_max E RSI > spike_rsi_max → LATE_SPIKE → não entra
  spike_guard:
    enabled: true
    spike_ret_max: 0.03     # ret_1d > 3% = rally já estendido
    spike_rsi_max: 65       # RSI > 65 + ret > 3% = entrada tardia

  # Stops específicos do Bot 2 (mais apertados que Bot 1)
  stop_loss_pct: 0.015       # SL 1.5%
  take_profit_pct: 0.02      # SG 2%
  trailing_stop_pct: 0.01    # Trailing 1%
  max_hold_hours: 120        # Max 5 dias (120 horas)

# ---------------------------------------------------------------------------
# Bot 2 v2 — Momentum com Early Reversal (disabled — backtest only)
# ---------------------------------------------------------------------------
momentum_filter_v2:
  enabled: false            # NUNCA ativar em prod sem backtest aprovado
  stablecoin_z_min: 1.3
  bb_pct_max: 0.98

  classic:
    rsi_min: 50
    ret_1d_min: 0.0

  early_reversal:
    enabled: true
    ret_1d_floor: -0.015    # -1.5% — não entrar em free fall
    rsi_floor: 35           # piso de oversold
    delta_ret_3h_min: 0.005 # melhoria mínima de 0.5% em 3h

# ---------------------------------------------------------------------------
# Data quality
# ---------------------------------------------------------------------------
dq:
  max_gap_hours_1h: 3       # alert if gap > 3h in 1h series
  min_rows_for_scoring: 14  # min rows in z-score window before using

# ---------------------------------------------------------------------------
# Model Health Indicator (dashboard visualisation only — no trading logic)
# ---------------------------------------------------------------------------
model_health:
  threshold_healthy: 0.15   # weighted avg delta < 0.15 → Saudável
  threshold_warning: 0.30   # weighted avg delta < 0.30 → Atenção (else → Desalinhado)

# ---------------------------------------------------------------------------
# Adaptive Weights — confidence weighting + kill switch graduado
# Reduz impacto de gates desalinhados sem alterar pesos base
# ---------------------------------------------------------------------------
adaptive_weights:
  enabled: true

  # Confidence weighting (aplicado sempre)
  confidence:
    enabled: true
    window_short: 30           # rolling 30d
    window_long: 60            # rolling 60d (peso maior)
    smooth_short: 0.3
    smooth_long: 0.7
    min_confidence: 0.0        # pode reduzir até zero
    smoothing_days: 5          # média dos últimos N pontos (reduz ruído pontual)
    weak_gate_threshold: 0.2   # abaixo disso, normaliza delta por magnitude

  # Kill switch graduado (aplicado SOBRE o confidence weighting)
  kill_switch:
    enabled: true
    severe_delta_threshold: 0.5      # delta >= 0.5 → weight *= 0.3
    severe_multiplier: 0.3           # reduz para 30%
    extreme_delta_threshold: 0.6     # delta >= 0.6 → weight = 0

  # Global confidence: multiplicador sistêmico no score total (após regime_mult)
  global_confidence:
    enabled: true
    source: "weighted_mean"    # "mean" ou "weighted_mean" (ponderado por base_weight)
    min_multiplier: 0.2        # mínimo — evita score zerar completamente
    max_multiplier: 1.0
    apply_to: "total_score"

  # Fallback se não houver dados suficientes
  min_days_for_confidence: 20

# ---------------------------------------------------------------------------
# Capital Management — multi-bucket portfolio (Opção A)
# enabled: false = backward compat (single pool); true = buckets ativos
# ---------------------------------------------------------------------------
capital_management:
  enabled: false          # ativar após migrar portfolio_state.json

  buckets:
    btc_bot1:
      name: "Bot 1 (Reversal)"
      allocation_pct: 0.5      # 50% do capital total
    btc_bot2:
      name: "Bot 2 (Momentum)"
      allocation_pct: 0.5      # 50% do capital total

  safety:
    max_drawdown_pct: 0.15          # pausa se DD do bucket >= 15%
    max_daily_loss_pct: 0.05        # pausa se perda diária >= 5%
    pause_hours_after_dd: 72        # 3 dias
    pause_hours_after_daily_loss: 24 # 1 dia
